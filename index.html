<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Kanggo Neng Dara ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
        }

        h1 {
            color: #ff477e;
            font-size: 26px;
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-size: 16px;
            line-height: 1.6;
            margin-top: 5px;
        }

        .sub-text {
            font-size: 14px;
            color: #7a7a7a;
            font-style: italic;
        }

        /* Tombol Love Pindah-pindah */
        .btn-love {
            background: none;
            border: none;
            font-size: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 20px;
            user-select: none;
        }

        .btn-love:hover {
            transform: scale(1.2);
        }

        /* Desain Amplop Surat */
        .envelope-wrapper {
            cursor: pointer;
            margin-top: 20px;
            display: none;
            transition: all 0.3s ease;
        }

        .envelope {
            position: relative;
            width: 120px;
            height: 80px;
            background: #ff7096;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-top: 45px solid #ff477e;
            transform-origin: top;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .envelope-love {
            font-size: 30px;
            z-index: 3;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Animasi Haté Marurag */
        .heart {
            position: absolute;
            color: #ff477e;
            font-size: 20px;
            animation: floatUp 4s linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .btn-next {
            background-color: #ff7096;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="box">
        <h1 id="title">HALLO SAYANG ! ❤️</h1>
        <p id="text">Klik love merah di handap bari seuri nyaa.. Upami teu seuri, moal tiasa kabuka tatananna 😋</p>
        
        <!-- Tombol Love Merah anu bakal pindah-pindah -->
        <button class="btn-love" id="loveBtn" onclick="moveAndChange()">❤️</button>

        <!-- Amplop Surat nu bakal muncul engké -->
        <div class="envelope-wrapper" id="envelopeContainer" onclick="openLetter()">
            <div class="envelope">
                <div class="envelope-love">❤️</div>
            </div>
            <p class="sub-text" style="margin-top: 10px; font-weight: bold;">Klik love dina amplop kanggo muka surat ti a Latip...</p>
        </div>
        
        <button class="btn-next" id="nextBtn" style="display:none;" onclick="nextLetterStage()">Klik Heula Kadieu Neng 🥺</button>
    </div>

    <script>
        let clickCount = 0;
        let letterStage = 0;

        function moveAndChange() {
            clickCount++;
            const title = document.getElementById('title');
            const text = document.getElementById('text');
            const loveBtn = document.getElementById('loveBtn');
            const envelopeContainer = document.getElementById('envelopeContainer');

            if (clickCount === 1) {
                title.innerText = "Yahhh... 😮‍💨";
                text.innerText = "Katingalina mah teu seuri neng dara na nya? Hayu seuri heula, cobian klik deui lovena!";
                // Pindah posisi sakedik supados lucu
                loveBtn.style.transform = "translateX(50px) scale(0.9)";
            } 
            else if (clickCount === 2) {
                title.innerText = "Eitss, Teu Tiasa! 😜";
                text.innerText = "Ih eta seurina katingali jiga nu kapaksa pisan, ih bieu mah! Cobi sakali deui, sing ikhlas seurinaa.. Klik deui lovena!";
                loveBtn.style.transform = "translateX(-60px) translateY(-10px) scale(1.1)";
            } 
            else if (clickCount === 3) {
                title.innerText = "Ih, Masi Ngambek? 🥺";
                text.innerText = "Masi ngambek ka a Latip? Naha atuh bet teu seuri waé? Cobi ayeuna klik sing bener bari seuri pang geulisna, pasti tiasa kabuka!";
                loveBtn.style.transform = "translateY(20px) scale(1.3)";
            } 
            else if (clickCount === 4) {
                // Sembunyikeun tombol love merah, ganti ku amplop surat
                loveBtn.style.display = 'none';
                title.innerText = "Nahhh Kitu Atuh! 😊✨";
                text.innerText = "Aya amplop surat ti a Latip khusus kanggo neng dara...";
                envelopeContainer.style.display = 'block';
            }
        }

        function openLetter() {
            const title = document.getElementById('title');
            const text = document.getElementById('text');
            const envelopeContainer = document.getElementById('envelopeContainer');
            const nextBtn = document.getElementById('nextBtn');

            // Sembunyikeun amplop, munculkeun eusi surat kahiji
            envelopeContainer.style.display = 'none';
            title.innerText = "Hapunten nya, Neng... 🥺🙏";
            text.innerText = "Neng, aa mnta hampura nya nu ntos-ntos, aa bner\" menta maaf geus nyieun neng kecewa ka aa, aa t aya maksud bikin neng kesel padahal kanyataan na neng kesel, tong ngambek deui nya sayang 🥹🙏🏻";
            nextBtn.style.display = 'block';
        }

        function nextLetterStage() {
            const title = document.getElementById('title');
            const text = document.getElementById('text');
            const nextBtn = document.getElementById('nextBtn');

            if (letterStage === 0) {
                title.innerText = "Aa Kapikiran Wae... 😔";
                text.innerText = "Aa kapikiran wae, ayna teh neng jeung aa ldr modalna ngan ukur chat hngkul jeung vc mun smpet eta ge, aa sok sieun jeung hariwang neng bosen ku kaayaan aa nu serba terbatas ieu 🥹";
                nextBtn.innerText = "Sakedap, Aya Deui...";
                letterStage++;
            } else if (letterStage === 1) {
                title.innerText = "Aa Bakal Satia Ngantosan 🤲✨";
                text.innerText = "Aa paham kamari aa seer salah na, aa bakal ngantosan neng sampe ka neng nu biasa chat aa bahagia 🥹 ku aa di antos nya sanajan lami oge 🥹";
                nextBtn.innerText = "Nu Terakhir Ti Aa... ❤️";
                letterStage++;
            } else if (letterStage === 2) {
                title.innerText = "I Love You Sayangku! ❤️";
                text.innerText = "Teu bosen-bosen aa ngomong kieu ka neng, te kedah rurusuhan dibales 'ilove u too' ayna ge teu nanaon, nu penting neng na ntong ambek deui ka aa nya 🥹, semangat kuliah na sing bageur sayang, tong baeud wae ka aa nya? ilove u sayang ku 🥹👉🏻👈🏻";
                nextBtn.style.display = 'none';
                
                // Efek haté marurag/ngalayang kaluhur
                setInterval(createHeart, 300);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
